<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" role="img" aria-label="Ace Management Consultancy">
  <defs>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d7b36a"/>
      <stop offset="0.55" stop-color="#b58a34"/>
      <stop offset="1" stop-color="#8a6418"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3a6aa8"/>
      <stop offset="1" stop-color="#0e2a47"/>
    </linearGradient>
    <radialGradient id="pulse" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d7b36a" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#d7b36a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- outer AI / orbit ring -->
  <circle cx="120" cy="120" r="112" fill="url(#pulse)"/>
  <circle cx="120" cy="120" r="104" fill="none" stroke="url(#ring)" stroke-width="1.2" stroke-dasharray="2 6"/>
  <circle cx="120" cy="120" r="92"  fill="none" stroke="#d7b36a" stroke-width="0.8" opacity="0.55"/>

  <!-- hex grid (AI / systems feel) -->
  <g fill="none" stroke="#d7b36a" stroke-width="1" opacity="0.35">
    <polygon points="120,34 168,62 168,118 120,146 72,118 72,62"/>
    <polygon points="120,54 150,72 150,108 120,126 90,108 90,72"/>
  </g>

  <!-- Central AE monogram (Ace) -->
  <g transform="translate(120 120)">
    <!-- A -->
    <path d="M -38 28 L -10 -28 L 18 28 M -30 12 L 10 12"
          fill="none" stroke="url(#core)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- C (orbit arc) -->
    <path d="M 38 -14 A 22 22 0 1 0 38 16"
          fill="none" stroke="url(#core)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- node dots -->
  <g fill="#d7b36a">
    <circle cx="120" cy="16"  r="3"/>
    <circle cx="224" cy="120" r="3"/>
    <circle cx="120" cy="224" r="3"/>
    <circle cx="16"  cy="120" r="3"/>
  </g>

  <!-- orbit marker -->
  <circle cx="212" cy="58" r="5" fill="#0e2a47" stroke="#d7b36a" stroke-width="1.2"/>
</svg>
